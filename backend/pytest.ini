# backend/pytest.ini
[pytest]

asyncio_mode = auto

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts = 
    -v
    --strict-markers
    --tb=short
    --color=yes

markers =
    asyncio: marks tests as async (required for async def test functions)
    integration: marks tests as integration tests (require database)
    unit: marks tests as unit tests (no external dependencies)
    crud: marks tests for CRUD operations
    service: marks tests for service layer logic
    ml: marks tests for machine learning components
    geospatial: marks tests for PostGIS/spatial queries
    slow: marks tests that take longer than 1 second

env =
    ENVIRONMENT=test
    DATABASE_URL=postgresql+asyncpg://postgres:185423@localhost:5432/safetrack_test
    TEST_DATABASE_URL=postgresql+asyncpg://postgres:185423@localhost:5432/safetrack_test
    JWT_SECRET_KEY=test-secret-key-for-testing-only-do-not-use-in-production
    JWT_REFRESH_SECRET_KEY=test-refresh-secret-key-for-testing-only
    JWT_ALGORITHM=HS256
    ACCESS_TOKEN_EXPIRE_MINUTES=30
    REFRESH_TOKEN_EXPIRE_DAYS=7
    REDIS_URL=redis://localhost:6379/1

filterwarnings =
    ignore::pydantic.PydanticDeprecatedSince20
    ignore::DeprecationWarning:joblib
    ignore:datetime.datetime.utcnow:DeprecationWarning